<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iceland&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/auth.css" />
  </head>
  <body>
    <form id="login-form">
      <input type="text" id="username-input" name="username" placeholder="Username" />
      <input type="password" name="password" id="password-input" placeholder="Password" />
      <button type="submit" id="submit-btn">Log in</button>
      <button type="button" id="toggle-btn">Don't have an account?</button>
    </form>
    <script type="module" src="/src/auth.js"></script>
  </body>
</html>
